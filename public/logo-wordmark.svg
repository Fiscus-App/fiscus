      <stop offset="0%" stop-color="#c8982e"/>
      <stop offset="45%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#f5cc5a"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="480" height="110" rx="12" fill="#05081a"/>
  <!-- FISCUS wordmark -->
  <text x="32" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="60"
