<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <linearGradient id="goldG3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8982e"/>
      <stop offset="50%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#f5cc5a"/>
    </linearGradient>
    <linearGradient id="bgG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1628"/>
      <stop offset="100%" stop-color="#05081a"/>
    </linearGradient>
    <linearGradient id="barG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5cc5a"/>
      <stop offset="100%" stop-color="#c8982e"/>
    </linearGradient>
  </defs>
  <!-- Full background -->
  <rect width="560" height="120" rx="14" fill="#05081a"/>
  <!-- App icon container -->
  <rect x="16" y="12" width="96" height="96" rx="20" fill="url(#bgG3)"/>
  <rect x="16.5" y="12.5" width="95" height="95" rx="19.5" fill="none"
        stroke="#e8b84b" stroke-width="1" stroke-opacity="0.30"/>
  <!-- Mini ascending bars -->
  <rect x="26" y="80" width="12" height="22" rx="3" fill="url(#barG3)" opacity="0.32"/>
  <rect x="42" y="66" width="12" height="36" rx="3" fill="url(#barG3)" opacity="0.55"/>
  <rect x="58" y="50" width="12" height="52" rx="3" fill="url(#barG3)" opacity="0.80"/>
  <rect x="74" y="32" width="12" height="70" rx="3" fill="url(#barG3)"/>
  <!-- Vertical divider -->
  <line x1="130" y1="18" x2="130" y2="102" stroke="rgba(232,184,75,0.18)" stroke-width="1"/>
  <!-- FISCUS wordmark -->
  <text x="148" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="52"
        font-weight="700" letter-spacing="7" fill="url(#goldG3)">FISCUS</text>
  <!-- Tagline -->
  <text x="150" y="96" font-family="Arial, Helvetica, sans-serif" font-size="9"
        letter-spacing="4.5" fill="#4e6082" font-weight="400">YOUR EDGE. EVERY MARKET.</text>
</svg>