# ─── Fiscus Automated News Ingestion ──────────────────────────────────────────
# Runs every 15 minutes (free on GitHub Actions).
# Calls the Vercel deployment to scrape sources and process with AI.
#
# Setup:
#   1. Go to GitHub repo → Settings → Secrets and variables → Actions
#   2. Add secret:  CRON_SECRET  (any random string, must match Vercel env var)
#   3. Add variable: VERCEL_URL  (e.g. https://fiscus-peach.vercel.app)

name: News Ingestion Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes, 24/7
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  ingest:
    name: Scrape & Process
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ingest articles from all sources
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/ingest_body.txt -w "%{http_code}" \
            -X POST "${{ vars.VERCEL_URL }}/api/cron/ingest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55)
          echo "Status: $HTTP_STATUS"
          cat /tmp/ingest_body.txt | python3 -m json.tool 2>/dev/null || cat /tmp/ingest_body.txt
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "Ingestion returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Wait before processing
        run: sleep 5

      - name: Process batch 1 — AI enrichment
        run: |
          curl -s -X POST "${{ vars.VERCEL_URL }}/api/cron/process" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55 | python3 -m json.tool 2>/dev/null

      - name: Process batch 2 — AI enrichment
        run: |
          curl -s -X POST "${{ vars.VERCEL_URL }}/api/cron/process" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55 | python3 -m json.tool 2>/dev/null

      - name: Process batch 3 — AI enrichment
        run: |
          curl -s -X POST "${{ vars.VERCEL_URL }}/api/cron/process" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55 | python3 -m json.tool 2>/dev/null
